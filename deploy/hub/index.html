<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CH2 DATA — 토지 실거래 통계·뷰어·필드노트" />
    <title>CH2 DATA</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="hero__eyebrow">부동산 데이터 플랫폼</p>
        <h1 class="hero__title">CH2 DATA</h1>
        <p class="hero__lead">토지·개발 데이터를 분석하고 기록하는 CH2 서비스 모음</p>
      </header>

      <main class="grid" aria-label="CH2 서비스">
        <a class="card card--live" href="https://macro.ch2data.com/">
          <span class="card__badge card__badge--live">이용 가능</span>
          <h2 class="card__name">CH2 Macro</h2>
          <p class="card__desc">토지 실거래 통계 분석</p>
          <span class="card__action">서비스 들어가기 →</span>
        </a>

        <a class="card card--live" href="https://viewer.ch2data.com/">
          <span class="card__badge card__badge--live">이용 가능</span>
          <h2 class="card__name">CH2 Viewer</h2>
          <p class="card__desc">엑셀·지도 연동 (Windows)</p>
          <span class="card__action">다운로드 →</span>
        </a>

        <a class="card card--live" href="https://fieldnote.ch2data.com/">
          <span class="card__badge card__badge--live">이용 가능</span>
          <h2 class="card__name">CH2 FieldNote</h2>
          <p class="card__desc">현장조사 PC GUI (웹)</p>
          <span class="card__action">서비스 들어가기 →</span>
        </a>
      </main>

      <footer class="footer">
        <p>© CH2 DATA</p>
      </footer>
    </div>
  </body>
</html>
