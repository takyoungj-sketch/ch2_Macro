# CH2 DATA — portal hub (ch2data.com root)
# /etc/nginx/sites-available/ch2data-hub
#
# 1) sudo mkdir -p /var/www/ch2data-hub
# 2) deploy/hub/* → /var/www/ch2data-hub (deploy/scripts/deploy-hub.sh)
# 3) sudo ln -sf /etc/nginx/sites-available/ch2data-hub /etc/nginx/sites-enabled/
# 4) sudo nginx -t && sudo systemctl reload nginx
# 5) sudo certbot --nginx -d ch2data.com -d www.ch2data.com

server {
    listen 80;
    listen [::]:80;
    server_name ch2data.com www.ch2data.com;

    root /var/www/ch2data-hub;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }
}
