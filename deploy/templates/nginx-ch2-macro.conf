# CH2 Macro — Nginx (dev VPS)
# / = 유형 선택 게이트웨이, /land/ /built/ /collective/ SPA, /api/ FastAPI
#
# certbot 최초: sudo certbot --nginx -d macro.ch2data.com
# (이 템플릿은 macro 전용 인증서 경로를 포함 — ch2-macro 교체 후 nginx -t)
# API 토큰 스니펫: deploy/scripts/vps_sync_nginx_api_token.sh 로 backend/.env 에서 생성

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name macro.ch2data.com;

    ssl_certificate /etc/letsencrypt/live/macro.ch2data.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/macro.ch2data.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    include /etc/nginx/snippets/ch2-basic-auth.conf;

    client_max_body_size 20m;

    location = /land {
        return 301 /land/;
    }

    location = /built {
        return 301 /built/;
    }

    location = /collective {
        return 301 /collective/;
    }

    location = / {
        root /opt/ch2_Macro/deploy/macro-gateway;
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location = /style.css {
        root /opt/ch2_Macro/deploy/macro-gateway;
        add_header Cache-Control "no-cache";
    }

    location = /land/index.html {
        alias /opt/ch2_Macro/frontend/dist/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /land/ {
        alias /opt/ch2_Macro/frontend/dist/;
        try_files $uri $uri/ /land/index.html;
    }

    location = /built/index.html {
        alias /opt/ch2_Macro/frontend-built/dist/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /built/ {
        alias /opt/ch2_Macro/frontend-built/dist/;
        try_files $uri $uri/ /built/index.html;
    }

    location = /collective/index.html {
        alias /opt/ch2_Macro/frontend-collective/dist/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /collective/ {
        alias /opt/ch2_Macro/frontend-collective/dist/;
        try_files $uri $uri/ /collective/index.html;
    }

    location /api/ {
        auth_basic off;
        include /etc/nginx/snippets/ch2-api-proxy-token.conf;
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name macro.ch2data.com;

    return 301 https://$host$request_uri;
}

