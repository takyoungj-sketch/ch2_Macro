# CH2 Macro — Nginx site (dev VPS) — 초기 HTTP (certbot 전)
# /etc/nginx/sites-available/ch2-macro
#
# 1) server_name 만 수정 후:
#    sudo nginx -t && sudo systemctl reload nginx
# 2) sudo certbot --nginx -d macro.ch2data.com
#    → certbot 이 HTTPS 블록·인증서 경로를 자동 추가함
#
# certbot 후에도 /api 프록시·SPA try_files 가 유지되는지 확인.
# 사라졌으면 deploy/templates/nginx-ch2-macro.conf 의 location 블록을 merge.

server {
    listen 80;
    listen [::]:80;
    server_name macro.ch2data.com 13.209.203.178;

    root /opt/ch2_Macro/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}
